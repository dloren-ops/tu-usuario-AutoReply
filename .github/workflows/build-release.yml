name: Build & Release APK

# Compila el APK y publica un Release automaticamente en cada push a main.
# La version se lee de app/build.gradle.kts (versionName).
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Read app version
        id: ver
        run: |
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version detectada: $VERSION"

      - name: Build debug APK (variante "client", la que se distribuye)
        run: ./gradlew assembleClientDebug --no-daemon

      - name: Rename APK with version
        run: |
          mkdir -p out
          cp app/build/outputs/apk/client/debug/app-client-debug.apk \
             out/AutoReply-v${{ steps.ver.outputs.version }}.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReply-apk
          path: out/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: AutoReply v${{ steps.ver.outputs.version }}
          files: out/*.apk
          make_latest: true
          body: |
            APK de AutoReply v${{ steps.ver.outputs.version }} generado automaticamente.

            Descarga el archivo .apk de abajo e instalalo en tu telefono.
            La propia app tambien detectara esta version desde "Buscar actualizaciones".
