name: Build & Release APK

# Se ejecuta cuando subes un tag de version (ej. v1.0, v1.1) o manualmente.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/AutoReply-${GITHUB_REF_NAME}.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReply-apk
          path: out/*.apk

      # Publica el APK en GitHub Releases (solo cuando es un tag v*).
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
